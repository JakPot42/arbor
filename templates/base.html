<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Arbor{% endblock %}</title>
  <link rel="stylesheet" href="/static/shared/css/app.css">
</head>
<body>
  <header class="site-header">
    <a href="/" class="site-logo">Arbor</a>
    <span class="site-tagline">Corporate due-diligence intelligence</span>
    <form action="/search" method="post" class="header-cmd command" role="search">
      <span class="prompt">&gt;</span>
      <input type="text" name="query" placeholder="entity / ticker / CIK" aria-label="Search entity, ticker, or CIK">
      <button type="submit">Search</button>
    </form>
  </header>
  <div class="main-content">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
